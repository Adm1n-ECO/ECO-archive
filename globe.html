const ARCS = [
  ['ny','lon'],['ny','hou'],['ny','lag'],['ny','mum'],['ny','atl'],['ny','tor'],['ny','chi'],['ny','aus'],
  ['lon','lag'],['lon','acc'],['lon','iba'],['lon','hou'],

// ════════════════════════════════════════════════════════════
//  NIGHT CITY LIGHTS — amber glow clusters on black canvas
// ════════════════════════════════════════════════════════════
function makeNightTex() {
  const W=2048, H=1024;
  const c=document.createElement('canvas'); c.width=W; c.height=H;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#000000'; ctx.fillRect(0,0,W,H);
  function p(lon,lat){return{x:((lon+180)/360)*W, y:((90-lat)/180)*H};}
  function city(lon,lat,sz,br){
    const pt=p(lon,lat), r=sz*(W/512), b=Math.min(1,br);
    const g=ctx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,r);
    g.addColorStop(0,  `rgba(255,${185+Math.floor(b*60)},${60+Math.floor(b*40)},${b*0.95})`);
    g.addColorStop(0.3,`rgba(255,${150+Math.floor(b*50)},40,${b*0.55})`);
    g.addColorStop(0.7,`rgba(255,110,10,${b*0.22})`);
    g.addColorStop(1,  'rgba(255,60,0,0)');
    ctx.beginPath(); ctx.arc(pt.x,pt.y,r,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
  }
  // North America
  city(-87.6,41.9,18,1.0);city(-74.0,40.7,22,1.0);city(-73.6,45.5,10,0.8);
  city(-79.4,43.7,12,0.85);city(-75.2,40.0,12,0.85);city(-77.0,38.9,14,0.9);
  city(-71.1,42.4,10,0.8);city(-84.4,33.7,11,0.8);city(-80.2,25.8,9,0.75);
  city(-86.8,36.2,8,0.7);city(-90.1,29.9,10,0.8);city(-95.4,29.8,14,0.88);
  city(-97.7,30.3,10,0.78);city(-96.8,32.8,11,0.82);city(-104.9,39.7,9,0.75);
  city(-112.1,33.4,10,0.78);city(-118.2,34.1,20,0.98);city(-122.4,37.8,14,0.9);
  city(-122.3,47.6,9,0.75);city(-123.1,49.2,8,0.72);city(-99.1,19.4,12,0.85);
  // Europe
  city(-0.1,51.5,18,0.98);city(2.3,48.9,18,0.98);city(13.4,52.5,16,0.95);
  city(4.9,52.4,12,0.88);city(3.2,50.8,10,0.82);city(2.2,41.4,12,0.85);
  city(-3.7,40.4,12,0.85);city(-9.1,38.7,9,0.78);city(12.5,41.9,13,0.88);
  city(11.6,48.1,11,0.84);city(8.7,50.1,11,0.84);city(9.2,45.5,10,0.8);
  city(16.4,48.2,9,0.78);city(14.5,50.1,8,0.75);city(18.9,47.5,9,0.78);
  city(21.0,52.2,8,0.75);city(23.7,37.9,9,0.78);city(28.9,41.0,13,0.88);
  city(37.6,55.8,15,0.92);city(30.3,59.9,9,0.78);
  // Middle East
  city(55.3,25.2,10,0.82);city(51.5,25.3,8,0.75);city(46.7,24.7,11,0.84);
  city(39.0,21.5,8,0.72);city(35.2,31.8,7,0.7);city(44.4,33.3,7,0.68);
  city(51.4,35.7,9,0.78);city(67.1,24.9,9,0.78);
  // Africa
  city(3.4,6.5,9,0.78);city(-0.2,5.6,7,0.68);city(3.9,7.4,6,0.65);
  city(36.8,-1.3,7,0.7);city(28.0,-26.2,9,0.78);city(18.4,-33.9,8,0.75);
  city(31.2,30.1,10,0.82);city(38.7,9.0,7,0.7);city(-17.4,14.7,6,0.65);
  // Asia
  city(121.5,31.2,22,1.0);city(116.4,39.9,22,1.0);city(113.3,23.1,14,0.9);
  city(114.1,22.4,12,0.88);city(139.7,35.7,24,1.0);city(135.5,34.7,14,0.9);
  city(127.0,37.6,14,0.9);city(72.9,19.1,16,0.95);city(77.2,28.6,14,0.9);
  city(80.3,13.1,11,0.84);city(88.4,22.6,12,0.85);city(103.8,1.4,12,0.88);
  city(106.8,-6.2,13,0.88);city(100.5,13.8,12,0.85);city(106.7,10.8,10,0.82);
  city(104.1,30.7,10,0.82);city(82.9,55.0,8,0.72);city(37.6,55.8,14,0.9);
  // South America
  city(-43.2,-22.9,14,0.88);city(-46.6,-23.5,16,0.92);
  city(-58.4,-34.6,11,0.82);city(-70.7,-33.5,9,0.75);
  // Australia
  city(151.2,-33.9,12,0.85);city(144.9,-37.8,10,0.82);city(153.0,-27.5,8,0.72);
  const t=new THREE.CanvasTexture(c); t.wrapS=THREE.RepeatWrapping; return t;
}

// ════════════════════════════════════════════════════════════
//  THREE.JS — renderer, camera, scene
// ════════════════════════════════════════════════════════════
const wrap=document.getElementById('globeWrap');
let W=wrap.clientWidth, H=wrap.clientHeight;

const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('tc'),antialias:true,alpha:false});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x000002,1);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(42,W/H,0.01,200);
camera.position.set(0,0,2.75); camera.lookAt(0,0,0);

// ── Stars ─────────────────────────────────────────────────
const sp=[];
for(let i=0;i<7000;i++){
  const t=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1), r=80+Math.random()*20;
  sp.push(r*Math.sin(ph)*Math.cos(t),r*Math.sin(ph)*Math.sin(t),r*Math.cos(ph));
}
const sg=new THREE.BufferGeometry();
sg.setAttribute('position',new THREE.Float32BufferAttribute(sp,3));
const sc=[],ss=[];
for(let i=0;i<7000;i++){
  const t=Math.random();
  if(t<0.04){sc.push(.75,.88,1);ss.push(2.0);}
  else if(t<0.12){sc.push(1,.95,.8);ss.push(1.4);}
  else{sc.push(1,1,1);ss.push(.5+Math.random()*.6);}
}
sg.setAttribute('color',new THREE.Float32BufferAttribute(sc,3));
sg.setAttribute('size', new THREE.Float32BufferAttribute(ss,1));
scene.add(new THREE.Points(sg,new THREE.ShaderMaterial({
  vertexShader:`attribute float size;attribute vec3 color;varying vec3 vC;
    void main(){vC=color;vec4 mv=modelViewMatrix*vec4(position,1.0);
    gl_PointSize=size*(300.0/-mv.z);gl_Position=projectionMatrix*mv;}`,
  fragmentShader:`varying vec3 vC;void main(){float d=length(gl_PointCoord-vec2(.5));
    if(d>.5)discard;gl_FragColor=vec4(vC,(1.0-smoothstep(.15,.5,d))*.92);}`,
  transparent:true,vertexColors:true,depthWrite:false
})));

// ── Sun direction ────────────────────────────────────────
const SUN=new THREE.Vector3(-0.5,0.4,0.8).normalize();

// ── Night texture (city lights) ───────────────────────────
const nightTex=makeNightTex();

// ── Earth shader — waits for day texture ─────────────────
const earthMat=new THREE.ShaderMaterial({
  uniforms:{
    dayTex:   {value:nightTex},  // placeholder until day loads
    nightTex: {value:nightTex},
    sunDir:   {value:new THREE.Vector3()},
    dayReady: {value:0.0},
  },
  vertexShader:`
    varying vec2 vUv;
    varying vec3 vN;
    varying vec3 vVP;
    void main(){
      vUv=uv;
      vN=normalize(normalMatrix*normal);
      vec4 vp=modelViewMatrix*vec4(position,1.0);
      vVP=vp.xyz;
      gl_Position=projectionMatrix*vp;
    }`,
  fragmentShader:`
    uniform sampler2D dayTex;
    uniform sampler2D nightTex;
    uniform vec3 sunDir;
    uniform float dayReady;
    varying vec2 vUv;
    varying vec3 vN;
    varying vec3 vVP;

    void main(){
      // Three.js SphereGeometry UV: u=0 at -X, increases CCW.
      // We want u=0 at -180 lon and east direction, standard equirectangular.
      vec2 uv = vec2(vUv.x, vUv.y);

      vec4 day   = texture2D(dayTex,   uv);
      vec4 night = texture2D(nightTex, uv);

      vec3 N=normalize(vN);
      vec3 S=normalize(sunDir);
      vec3 V=normalize(-vVP);

      // Day/night blend
      float cosA  = dot(N,S);
      float dayF  = smoothstep(-0.10,0.16,cosA)*dayReady;
      float nightF= (1.0-smoothstep(-0.18,0.06,cosA));

      // Day shading — lambertian
      float diff    = max(0.0,cosA);
      vec3 dayCol   = day.rgb*(0.06+0.94*diff);

      // Night — city lights, visible only in dark zone
      vec3 nightCol = night.rgb*nightF*1.5;

      vec3 col = nightCol + dayCol*dayF;

      // Specular on ocean (high blue relative to red)
      vec3 H=normalize(S+V);
      float spec=pow(max(dot(N,H),0.0),110.0);
      float ocean=clamp((day.b-day.r*1.3-day.g*0.2)*2.8,0.0,1.0);
      col+=spec*0.85*dayF*ocean*vec3(0.7,0.86,1.0);

      // Atmospheric limb
      float rim=pow(1.0-max(dot(N,V),0.0),3.2);
      float limb=0.4+0.6*max(cosA,0.0);
      col+=rim*mix(0.04,0.24,limb)*vec3(0.06,0.28,1.0);

      gl_FragColor=vec4(col,1.0);
    }`
});

// Convert sun to view space
earthMat.uniforms.sunDir.value.copy(SUN.clone().transformDirection(camera.matrixWorldInverse));

// ── Load bundled day texture (local — no CORS) ────────────
const loader=new THREE.TextureLoader();
loader.load(
  'textures/earth_day.jpg',
  (tex)=>{
    tex.wrapS=THREE.RepeatWrapping;
    earthMat.uniforms.dayTex.value=tex;
    earthMat.uniforms.dayReady.value=1.0;
    earthMat.needsUpdate=true;
  }
);

const earth=new THREE.Mesh(new THREE.SphereGeometry(1,96,48),earthMat);
earth.rotation.y=-0.4;   // Atlantic facing camera on load
earth.rotation.x=-0.15;
scene.add(earth);

// ── Atmosphere halo ───────────────────────────────────────
scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.055,64,32),
  new THREE.ShaderMaterial({
    uniforms:{sunDir:{value:earthMat.uniforms.sunDir.value}},
    vertexShader:`varying vec3 vN;varying vec3 vVP;
      void main(){vN=normalize(normalMatrix*normal);
      vec4 vp=modelViewMatrix*vec4(position,1.0);vVP=vp.xyz;gl_Position=projectionMatrix*vp;}`,
    fragmentShader:`uniform vec3 sunDir;varying vec3 vN;varying vec3 vVP;
      void main(){vec3 N=normalize(vN);vec3 V=normalize(-vVP);
      float rim=pow(1.0-max(dot(N,V),0.0),1.9);
      float lit=dot(N,normalize(sunDir));float dayF=smoothstep(-.5,1.0,lit);
      vec3 col=mix(vec3(0.02,0.04,0.28),vec3(0.10,0.38,1.0),dayF);
      gl_FragColor=vec4(col,rim*(0.16+0.58*dayF)*0.78);}`,
    transparent:true,depthWrite:false,side:THREE.FrontSide,blending:THREE.AdditiveBlending
  })
));

// ════════════════════════════════════════════════════════════
//  OVERLAY CANVAS
// ════════════════════════════════════════════════════════════
const oc=document.getElementById('oc'),oct=oc.getContext('2d');
oc.width=W; oc.height=H;
const D2R=Math.PI/180, R2D=180/Math.PI;
const show={arcs:true,labels:true};

function toScreen(lat,lon){
  const phi=lat*D2R,lonR=lon*D2R;
  const v=new THREE.Vector3(Math.cos(phi)*Math.sin(lonR),Math.sin(phi),Math.cos(phi)*Math.cos(lonR));
  v.applyEuler(earth.rotation);
  if(v.z<0.02)return null;
  const p=v.clone().project(camera);
  return{x:(p.x+1)/2*W,y:(-p.y+1)/2*H};
}

function drawArc(la1,lo1,la2,lo2,col,lw,dash){
  const l1=la1*D2R,o1=lo1*D2R,l2=la2*D2R,o2=lo2*D2R;
  const cosD=Math.sin(l1)*Math.sin(l2)+Math.cos(l1)*Math.cos(l2)*Math.cos(o2-o1);
  const d=Math.acos(Math.max(-1,Math.min(1,cosD))),sd=Math.sin(d)||1e-9;
  oct.beginPath();dash?oct.setLineDash([4,5]):oct.setLineDash([]);
  let go=false;
  for(let i=0;i<=80;i++){
    const t=i/80,f1=Math.sin((1-t)*d)/sd,f2=Math.sin(t*d)/sd;
    const x3=f1*Math.cos(l1)*Math.cos(o1)+f2*Math.cos(l2)*Math.cos(o2);
    const y3=f1*Math.cos(l1)*Math.sin(o1)+f2*Math.cos(l2)*Math.sin(o2);
    const z3=f1*Math.sin(l1)+f2*Math.sin(l2);
    const p=toScreen(Math.atan2(z3,Math.sqrt(x3*x3+y3*y3))*R2D,Math.atan2(y3,x3)*R2D);
    if(!p){go=false;continue;}
    go?oct.lineTo(p.x,p.y):oct.moveTo(p.x,p.y);go=true;
  }
  oct.strokeStyle=col;oct.lineWidth=lw;oct.stroke();oct.setLineDash([]);
}

function drawOverlay(){
  oct.clearRect(0,0,W,H);
  if(show.arcs)ARCS.forEach(([aid,bid])=>{
    const a=LOCS.find(l=>l.id===aid),b=LOCS.find(l=>l.id===bid);if(!a||!b)return;
    const isU=a.isUser||b.isUser;
    drawArc(a.lat,a.lon,b.lat,b.lon,isU?'rgba(77,168,200,.72)':'rgba(168,216,234,.30)',isU?1.9:.85,!isU);
  });
  LOCS.forEach(loc=>{
    const p=toScreen(loc.lat,loc.lon);if(!p)return;
    const r=loc.isUser?10:7;
    const col=loc.isUser?'#4DA8C8':loc.status==='active'?'#A8D8EA':
      loc.status==='memoriam'?'#9A7CC8':loc.status==='kept'?'#6AAA80':'#A8C4C8';
    const rr=parseInt(col.slice(1,3),16),gg=parseInt(col.slice(3,5),16),bb=parseInt(col.slice(5,7),16);
    if(loc.isUser){
      oct.beginPath();oct.arc(p.x,p.y,r+20,0,Math.PI*2);
      oct.strokeStyle='rgba(77,168,200,.07)';oct.lineWidth=5;oct.stroke();
      oct.beginPath();oct.arc(p.x,p.y,r+9,0,Math.PI*2);
      oct.strokeStyle='rgba(77,168,200,.20)';oct.lineWidth=2.5;oct.stroke();
    }
    const grd=oct.createRadialGradient(p.x,p.y,0,p.x,p.y,r*4);
    grd.addColorStop(0,`rgba(${rr},${gg},${bb},.30)`);
    grd.addColorStop(1,`rgba(${rr},${gg},${bb},.00)`);
    oct.beginPath();oct.arc(p.x,p.y,r*4,0,Math.PI*2);oct.fillStyle=grd;oct.fill();
    oct.beginPath();oct.arc(p.x,p.y,r,0,Math.PI*2);
    oct.fillStyle=col;oct.fill();
    oct.strokeStyle='rgba(0,0,0,.55)';oct.lineWidth=1.5;oct.stroke();
    if(show.labels){
      oct.font=`${loc.isUser?'600':'400'} ${loc.isUser?12:10}px 'DM Sans',sans-serif`;
      const lbl=loc.city,tw=oct.measureText(lbl).width,lx=p.x-tw/2,ly=p.y-r-8;
      oct.fillStyle='rgba(4,16,28,.80)';oct.fillRect(lx-3,ly-11,tw+6,14);
      oct.fillStyle=loc.isUser?'#4DA8C8':'rgba(240,237,230,.92)';oct.fillText(lbl,lx,ly);
    }
  });
}

// ════════════════════════════════════════════════════════════
//  ANIMATION + INTERACTION
// ════════════════════════════════════════════════════════════
let spinning=true,isDragging=false,dragX=0,dragY=0,lastTS=null;
const tc=document.getElementById('tc');
tc.style.cursor='grab';

tc.addEventListener('mousedown',e=>{isDragging=true;dragX=e.clientX;dragY=e.clientY;tc.style.cursor='grabbing';document.getElementById('hint').style.opacity='0';});
window.addEventListener('mousemove',e=>{
  if(!isDragging){
    const rect=tc.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
    let hit=null;
    LOCS.forEach(loc=>{const p=toScreen(loc.lat,loc.lon);if(!p)return;if((mx-p.x)**2+(my-p.y)**2<(loc.isUser?10:7+14)**2)hit=loc;});
    const tt=document.getElementById('tt');
    if(hit){
      document.getElementById('tt-name').textContent=hit.name;
      document.getElementById('tt-loc').textContent=`${hit.city} · ${hit.country}`;
      const seg=document.getElementById('tt-seg');
      seg.textContent=hit.isUser?'You':hit.status==='memoriam'?'In memoriam':hit.status==='kept'?'Kept alive':'Active';
      seg.style.color=hit.isUser?'#4DA8C8':hit.status==='memoriam'?'#9A7CC8':hit.status==='kept'?'#6AAA80':'#A8D8EA';
      tt.style.opacity='1';tt.style.left=(e.clientX+16)+'px';tt.style.top=(e.clientY-10)+'px';
    }else tt.style.opacity='0';
    return;
  }
  earth.rotation.y+=(e.clientX-dragX)*0.005;
  earth.rotation.x=Math.max(-1.2,Math.min(1.2,earth.rotation.x+(e.clientY-dragY)*0.005));
  dragX=e.clientX;dragY=e.clientY;
});
window.addEventListener('mouseup',()=>{isDragging=false;tc.style.cursor='grab';});
tc.addEventListener('mouseleave',()=>{if(!isDragging)document.getElementById('tt').style.opacity='0';});
tc.addEventListener('touchstart',e=>{e.preventDefault();isDragging=true;dragX=e.touches[0].clientX;dragY=e.touches[0].clientY;},{passive:false});
tc.addEventListener('touchmove',e=>{e.preventDefault();if(!isDragging)return;earth.rotation.y+=(e.touches[0].clientX-dragX)*0.005;earth.rotation.x=Math.max(-1.2,Math.min(1.2,earth.rotation.x+(e.touches[0].clientY-dragY)*0.005));dragX=e.touches[0].clientX;dragY=e.touches[0].clientY;},{passive:false});
tc.addEventListener('touchend',()=>{isDragging=false;});
tc.addEventListener('wheel',e=>{e.preventDefault();camera.position.z=Math.max(1.5,Math.min(5.0,camera.position.z+e.deltaY*0.003));camera.updateProjectionMatrix();},{passive:false});

function animate(ts){
  if(spinning&&!isDragging&&lastTS!==null)earth.rotation.y+=(ts-lastTS)*0.00020;
  lastTS=ts;
  renderer.render(scene,camera);
  drawOverlay();
  requestAnimationFrame(animate);
}

function toggleL(n,btn){show[n]=!show[n];btn.classList.toggle('on',show[n]);}
window.toggleL=toggleL;
function toggleSpin(btn){spinning=!spinning;btn.textContent=spinning?'⏸ Pause':'▶ Spin';btn.classList.toggle('on',spinning);}
window.toggleSpin=toggleSpin;
function resetView(){earth.rotation.set(-0.15,-0.4,0);camera.position.z=2.75;camera.updateProjectionMatrix();}
window.resetView=resetView;
window.addEventListener('resize',()=>{W=wrap.clientWidth;H=wrap.clientHeight;renderer.setSize(W,H);camera.aspect=W/H;camera.updateProjectionMatrix();oc.width=W;oc.height=H;});
setTimeout(()=>{document.getElementById('hint').style.opacity='0';},4000);
requestAnimationFrame(animate);
</script>
