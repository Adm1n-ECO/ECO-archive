<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECO — Kinship Review</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #080D14;
    --bg2: #0D1520;
    --bg3: #111C2A;
    --blue: #00AAFF;
    --green: #00CC44;
    --white: #FFFFFF;
    --muted: rgba(255,255,255,0.45);
    --dim: rgba(255,255,255,0.18);
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--white);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 13px;
    min-height: 100vh;
  }
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border2);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .wordmark { font-family: "Arial Black", Arial, sans-serif; font-weight: 900; font-size: 16px; }
  .wordmark .e { color: var(--blue); }
  .wordmark .c { color: var(--green); }
  .wordmark .o { color: var(--white); }
  .header-title { color: var(--muted); font-size: 12px; flex: 1; }
  .focal-select {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 6px 12px;
  }
  .focal-select label { color: var(--muted); font-size: 11px; white-space: nowrap; }
  .focal-select select {
    background: transparent;
    border: none;
    color: var(--white);
    font-family: Arial, sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
    max-width: 200px;
  }
  .focal-select select option { background: #0D1520; }
  .stats {
    display: flex;
    gap: 16px;
    padding: 12px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .stat { color: var(--muted); font-size: 11px; }
  .stat strong { color: var(--white); }
  .stat.changes { color: var(--blue); }
  .search-bar {
    padding: 10px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .search-bar input {
    width: 100%;
    max-width: 320px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 7px 12px;
    color: var(--white);
    font-family: Arial, sans-serif;
    font-size: 13px;
    outline: none;
  }
  .search-bar input::placeholder { color: var(--dim); }
  .search-bar input:focus { border-color: var(--blue); }
  .filter-pills {
    display: flex;
    gap: 6px;
    padding: 8px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .pill {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .pill:hover, .pill.active { border-color: var(--blue); color: var(--blue); background: rgba(0,170,255,0.08); }
  .pill.active { font-weight: 700; }
  table { width: 100%; border-collapse: collapse; }
  thead {
    background: var(--bg3);
    position: sticky;
    top: 57px;
    z-index: 50;
  }
  th {
    padding: 10px 16px;
    text-align: left;
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border2);
  }
  tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tr:hover { background: var(--bg3); }
  tr.changed { background: rgba(0,170,255,0.04); }
  tr.changed:hover { background: rgba(0,170,255,0.08); }
  td { padding: 9px 16px; vertical-align: middle; }
  .member-name { font-weight: 600; font-size: 13px; }
  .member-id { color: var(--dim); font-size: 10px; font-family: monospace; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }
  .current-term {
    color: var(--muted);
    font-size: 12px;
    padding: 3px 8px;
    background: var(--bg3);
    border-radius: 4px;
    border: 1px solid var(--border);
    display: inline-block;
  }
  .current-term.override { color: var(--blue); border-color: rgba(0,170,255,0.3); background: rgba(0,170,255,0.06); }
  .edit-input {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 5px 10px;
    color: var(--white);
    font-family: Arial, sans-serif;
    font-size: 12px;
    width: 140px;
    outline: none;
    transition: border-color .15s;
  }
  .edit-input:focus { border-color: var(--blue); }
  .edit-input.dirty { border-color: var(--blue); background: rgba(0,170,255,0.06); }
  .btn-save {
    background: var(--blue);
    border: none;
    border-radius: 6px;
    color: var(--bg);
    font-family: "Arial Black", Arial, sans-serif;
    font-weight: 900;
    font-size: 11px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .btn-save:hover { background: #33BBFF; }
  .btn-save:disabled { opacity: 0.4; cursor: default; }
  .btn-clear {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--muted);
    font-size: 11px;
    padding: 5px 10px;
    cursor: pointer;
    margin-left: 4px;
  }
  .btn-clear:hover { border-color: rgba(255,255,255,0.3); color: var(--white); }
  .saved-badge { color: var(--green); font-size: 11px; margin-left: 6px; opacity: 0; transition: opacity .3s; }
  .saved-badge.show { opacity: 1; }
  .btn-save-all {
    background: var(--green);
    border: none;
    border-radius: 8px;
    color: var(--bg);
    font-family: "Arial Black", Arial, sans-serif;
    font-weight: 900;
    font-size: 12px;
    padding: 8px 18px;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-save-all:hover { background: #33DD66; }
  .btn-save-all:disabled { opacity: 0.4; cursor: default; }
  .footer {
    position: sticky;
    bottom: 0;
    background: var(--bg2);
    border-top: 1px solid var(--border2);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .footer-msg { color: var(--muted); font-size: 12px; flex: 1; }
  #status-msg { color: var(--blue); font-size: 12px; }
  .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
  .error { color: #FF4466; padding: 20px; }
</style>
</head>
<body>

<header>
  <div class="wordmark"><span class="e">E</span><span class="c">C</span><span class="o">O</span></div>
  <div class="header-title">Kinship Review — lightning-001</div>
  <div class="focal-select">
    <label>VIEWING AS</label>
    <select id="focal-select"><option value="">Loading…</option></select>
  </div>
</header>

<div class="stats">
  <div class="stat">Members: <strong id="st-total">—</strong></div>
  <div class="stat">Overrides stored: <strong id="st-overrides">—</strong></div>
  <div class="stat changes">Pending changes: <strong id="st-pending">0</strong></div>
</div>

<div class="search-bar">
  <input type="text" id="search" placeholder="Search by name or kinship term…" oninput="renderTable()">
</div>

<div class="filter-pills" id="filter-pills"></div>

<div id="table-wrap">
  <div class="loading">Loading…</div>
</div>

<div class="footer">
  <div class="footer-msg">✎ marks an existing override. Edit any term and Save, or batch with Save All.</div>
  <span id="status-msg"></span>
  <button class="btn-save-all" id="btn-save-all" onclick="saveAll()" disabled>Save All Changes</button>
</div>

<script>
const SB_URL = 'https://bmipnqgofezjcllhmczg.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtaXBucWdvZmV6amNsbGhtY3pnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjIxMDksImV4cCI6MjA5MDgzODEwOX0._izGhqbWSzdF9HbafNjxLeCVtgVWojpSMIotXSJbH0k';
const sb = supabase.createClient(SB_URL, SB_KEY);

let allUsers = [], kinshipMap = {}, overrideMap = {}, pendingMap = {};
let focalId = 'STAR', activeFilter = 'All';

const COLORS = { India:'#FFB347', Fiji:'#00CED1', Pakistan:'#9B59B6', Adopted:'#00AAFF' };

async function init() {
  const { data: users } = await sb.from('users_public')
    .select('user_id,full_name,first_name,gender,cultural_origin,status')
    .eq('network_id','lightning-001')
    .neq('status','Placeholder')
    .order('full_name');
  allUsers = users || [];

  const sel = document.getElementById('focal-select');
  sel.innerHTML = allUsers.map(u =>
    `<option value="${u.user_id}"${u.user_id==='STAR'?' selected':''}>${u.full_name}</option>`
  ).join('');
  sel.addEventListener('change', e => { focalId = e.target.value; loadKinship(); });
  await loadKinship();
}

async function loadKinship() {
  document.getElementById('table-wrap').innerHTML = '<div class="loading">Loading kinship terms…</div>';
  pendingMap = {};
  updatePendingCount();

  const [{ data: terms }, { data: overrides }] = await Promise.all([
    sb.rpc('get_all_kinship', { p_focal_id: focalId, p_language: 'Hindi' }),
    sb.from('kinship_overrides').select('subject_id,display_label')
      .eq('network_id','lightning-001').eq('focal_id', focalId)
  ]);

  kinshipMap = {};
  (terms || []).forEach(r => { kinshipMap[r.user_id] = r.kinship_term; });
  overrideMap = {};
  (overrides || []).forEach(r => { overrideMap[r.subject_id] = r.display_label; });

  renderTable();
  buildFilterPills();
  updateStats();
}

function renderTable() {
  const q = (document.getElementById('search')?.value || '').toLowerCase();
  const rows = allUsers.filter(u => {
    if (u.user_id === focalId) return false;
    const t = kinshipMap[u.user_id] || 'Family';
    if (activeFilter !== 'All' && t !== activeFilter) return false;
    if (q) return u.full_name.toLowerCase().includes(q) || t.toLowerCase().includes(q);
    return true;
  }).map(u => {
    const term = kinshipMap[u.user_id] || 'Family';
    const isOvr = !!overrideMap[u.user_id];
    const pend = pendingMap[u.user_id];
    const dirty = pend !== undefined && pend !== term;
    const col = COLORS[u.cultural_origin] || '#888';
    return `<tr class="${dirty?'changed':''}" id="row-${u.user_id}">
      <td><div style="display:flex;align-items:center;gap:8px;">
        <span class="dot" style="background:${col}"></span>
        <div><div class="member-name">${u.full_name}</div>
        <div class="member-id">${u.user_id}</div></div>
      </div></td>
      <td><span class="current-term ${isOvr?'override':''}">${term}${isOvr?' ✎':''}</span></td>
      <td><div style="display:flex;align-items:center;gap:6px;">
        <input class="edit-input${dirty?' dirty':''}" id="inp-${u.user_id}"
          type="text" placeholder="Enter correction…"
          value="${pend !== undefined ? pend : ''}"
          oninput="onEdit('${u.user_id}',this.value)">
        <button class="btn-save" id="btn-${u.user_id}"
          onclick="saveSingle('${u.user_id}')"
          ${dirty?'':'disabled'}>Save</button>
        ${dirty?`<button class="btn-clear" onclick="clearEdit('${u.user_id}')">✕</button>`:''}
        <span class="saved-badge" id="badge-${u.user_id}">✓</span>
      </div></td>
    </tr>`;
  }).join('');

  document.getElementById('table-wrap').innerHTML = `<table>
    <thead><tr>
      <th style="width:30%">Member</th>
      <th style="width:20%">Current Term</th>
      <th style="width:50%">Correction</th>
    </tr></thead>
    <tbody>${rows || '<tr><td colspan="3" style="color:var(--muted);padding:20px 16px;">No members match.</td></tr>'}</tbody>
  </table>`;
}

function onEdit(uid, val) {
  const cur = kinshipMap[uid] || 'Family';
  const dirty = val.trim() !== '' && val.trim() !== cur;
  dirty ? pendingMap[uid] = val.trim() : delete pendingMap[uid];
  document.getElementById(`inp-${uid}`)?.classList.toggle('dirty', dirty);
  const btn = document.getElementById(`btn-${uid}`);
  if (btn) btn.disabled = !dirty;
  updatePendingCount();
  document.getElementById('btn-save-all').disabled = !Object.keys(pendingMap).length;
}

function clearEdit(uid) {
  delete pendingMap[uid];
  const inp = document.getElementById(`inp-${uid}`);
  if (inp) { inp.value = ''; inp.classList.remove('dirty'); }
  const btn = document.getElementById(`btn-${uid}`);
  if (btn) btn.disabled = true;
  document.getElementById(`row-${uid}`)?.classList.remove('changed');
  updatePendingCount();
  document.getElementById('btn-save-all').disabled = !Object.keys(pendingMap).length;
}

async function saveSingle(uid) {
  const val = pendingMap[uid]; if (!val) return;
  const btn = document.getElementById(`btn-${uid}`);
  btn.disabled = true; btn.textContent = '…';
  await upsert(uid, val);
  kinshipMap[uid] = val; overrideMap[uid] = val; delete pendingMap[uid];
  btn.textContent = 'Save';
  const badge = document.getElementById(`badge-${uid}`);
  if (badge) { badge.classList.add('show'); setTimeout(() => badge.classList.remove('show'), 2000); }
  document.getElementById(`row-${uid}`)?.classList.remove('changed');
  const termEl = document.querySelector(`#row-${uid} .current-term`);
  if (termEl) { termEl.textContent = val + ' ✎'; termEl.classList.add('override'); }
  updatePendingCount(); updateStats();
  document.getElementById('btn-save-all').disabled = !Object.keys(pendingMap).length;
}

async function saveAll() {
  const entries = Object.entries(pendingMap); if (!entries.length) return;
  const btn = document.getElementById('btn-save-all');
  btn.disabled = true; btn.textContent = `Saving ${entries.length}…`;
  setStatus(`Saving ${entries.length} changes…`);
  for (const [uid, val] of entries) {
    await upsert(uid, val);
    kinshipMap[uid] = val; overrideMap[uid] = val;
  }
  pendingMap = {};
  btn.textContent = 'Save All Changes';
  setStatus(`✓ ${entries.length} changes saved`);
  setTimeout(() => setStatus(''), 3000);
  updateStats(); updatePendingCount(); renderTable(); buildFilterPills();
}

async function upsert(uid, val) {
  await sb.from('kinship_overrides').upsert({
    network_id: 'lightning-001', focal_id: focalId,
    subject_id: uid, display_label: val,
    label_source: 'Family', note: 'Kinship Review Tool'
  }, { onConflict: 'network_id,focal_id,subject_id' });
}

function buildFilterPills() {
  const counts = {};
  allUsers.forEach(u => {
    if (u.user_id === focalId) return;
    const t = kinshipMap[u.user_id] || 'Family';
    counts[t] = (counts[t] || 0) + 1;
  });
  const total = allUsers.filter(u => u.user_id !== focalId).length;
  const pills = [['All', total], ...Object.entries(counts).sort((a,b) => b[1]-a[1])];
  document.getElementById('filter-pills').innerHTML = pills.map(([t,c]) =>
    `<div class="pill${activeFilter===t?' active':''}" onclick="setFilter('${t}')">${t} <span style="opacity:.5">${c}</span></div>`
  ).join('');
}

function setFilter(t) { activeFilter = t; buildFilterPills(); renderTable(); }
function updatePendingCount() { document.getElementById('st-pending').textContent = Object.keys(pendingMap).length; }
function updateStats() {
  document.getElementById('st-total').textContent = allUsers.filter(u => u.user_id !== focalId).length;
  document.getElementById('st-overrides').textContent = Object.keys(overrideMap).length;
}
function setStatus(m) { document.getElementById('status-msg').textContent = m; }

init().catch(e => { document.getElementById('table-wrap').innerHTML = `<div class="error">Error: ${e.message}</div>`; });
</script>
</body>
</html>
