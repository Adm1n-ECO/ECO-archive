<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FMTO — Network Tree</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.resend.com https://api.stripe.com https://api.zippopotam.us https://nominatim.openstreetmap.org https://cdn.jsdelivr.net; object-src 'none'; frame-ancestors 'none';">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;500&display=swap">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',system-ui,sans-serif;background:#070D14;color:#E8F4F0;-webkit-font-smoothing:antialiased;}

/* ── Nav ─────────────────────────────────────────────── */
.nav{background:#0D1820;border-bottom:1px solid rgba(0,229,204,.10);height:52px;display:flex;align-items:center;padding:0 16px;gap:10px;position:relative;z-index:300;flex-shrink:0;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-logo-mark{width:22px;height:26px;}
.nav-wordmark{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.12em;color:#E8F4F0;}
.nav-sep{width:1px;height:20px;background:rgba(0,229,204,.12);margin:0 2px;}
.nav-link{font-size:12px;color:#3A5A54;text-decoration:none;padding:4px 8px;border-radius:6px;transition:color .12s,background .12s;}
.nav-link:hover{color:#00E5CC;background:rgba(0,229,204,.07);}
.nav-link.active{color:#00E5CC;}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:8px;}
.nav-badge{background:rgba(0,229,204,.10);border:1px solid rgba(0,229,204,.18);color:#00A094;font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;padding:3px 9px;border-radius:999px;}
.nav-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#00E5CC,#00E040);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#070D14;cursor:pointer;flex-shrink:0;}
.back-link{font-size:11px;color:#3A5A54;text-decoration:none;display:flex;align-items:center;gap:4px;}
.back-link:hover{color:#00E5CC;}

/* ── Layout ──────────────────────────────────────────── */
.shell{display:flex;height:calc(100vh - 52px);}

/* ── Left sidebar: segments ──────────────────────────── */
.seg-sidebar{width:220px;flex-shrink:0;background:#0A1520;border-right:1px solid rgba(0,229,204,.08);display:flex;flex-direction:column;overflow:hidden;transition:width .22s;}
.seg-sidebar.collapsed{width:44px;}
.seg-header{padding:14px 14px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,229,204,.07);flex-shrink:0;}
.seg-title{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#3A5A54;white-space:nowrap;overflow:hidden;}
.seg-collapse{width:24px;height:24px;background:transparent;border:1px solid rgba(0,229,204,.12);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .12s;}
.seg-collapse:hover{border-color:rgba(0,229,204,.30);}
.seg-collapse svg{width:12px;height:12px;stroke:#3A5A54;}
.seg-body{flex:1;overflow-y:auto;padding:10px 0;}
.seg-body::-webkit-scrollbar{width:3px;}
.seg-body::-webkit-scrollbar-track{background:transparent;}
.seg-body::-webkit-scrollbar-thumb{background:rgba(0,229,204,.15);border-radius:99px;}

/* Segment pill */
.seg-item{display:flex;align-items:center;gap:9px;padding:7px 14px;cursor:pointer;transition:background .12s;border-radius:0;}
.seg-item:hover{background:rgba(0,229,204,.05);}
.seg-item.off .seg-dot{opacity:.25;}
.seg-item.off .seg-label{color:#3A5A54;}
.seg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.seg-label{font-size:12px;color:#C8D4D0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.seg-count{font-size:10px;color:#3A5A54;font-family:'JetBrains Mono',monospace;flex-shrink:0;}
.seg-toggle{width:28px;height:16px;background:rgba(0,229,204,.12);border-radius:999px;position:relative;flex-shrink:0;transition:background .14s;}
.seg-item:not(.off) .seg-toggle{background:rgba(0,229,204,.30);}
.seg-toggle::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#00E5CC;transition:transform .14s,background .14s;}
.seg-item.off .seg-toggle::after{transform:none;background:#3A5A54;}
.seg-item:not(.off) .seg-toggle::after{transform:translateX(12px);}

.seg-divider{height:1px;background:rgba(0,229,204,.06);margin:8px 14px;}

.seg-add-btn{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;color:#3A5A54;font-size:12px;transition:color .12s;}
.seg-add-btn:hover{color:#00E5CC;}
.seg-add-btn svg{width:14px;height:14px;stroke:currentColor;}

/* All / None quick filters */
.seg-quick{display:flex;gap:6px;padding:0 14px 10px;}
.seg-qbtn{font-size:10px;color:#3A5A54;background:transparent;border:1px solid rgba(0,229,204,.10);border-radius:5px;padding:3px 8px;cursor:pointer;transition:all .12s;}
.seg-qbtn:hover{color:#00E5CC;border-color:rgba(0,229,204,.25);}

/* Collapsed state — only dots */
.collapsed .seg-title,.collapsed .seg-label,.collapsed .seg-count,.collapsed .seg-toggle,.collapsed .seg-quick,.collapsed .seg-add-btn,.collapsed .seg-divider{display:none;}
.collapsed .seg-item{justify-content:center;padding:8px 0;}
.collapsed .seg-dot{width:11px;height:11px;}
.collapsed .seg-header{justify-content:center;padding:14px 0 10px;}

/* ── Main canvas ─────────────────────────────────────── */
.tree-canvas{flex:1;position:relative;overflow:hidden;}
#tree-svg{width:100%;height:100%;cursor:grab;}
#tree-svg:active{cursor:grabbing;}

/* ── Toolbar (top of canvas) ─────────────────────────── */
.tree-toolbar{position:absolute;top:12px;left:12px;right:12px;display:flex;align-items:center;justify-content:space-between;pointer-events:none;z-index:10;}
.toolbar-l,.toolbar-r{display:flex;align-items:center;gap:8px;pointer-events:all;}
.tb-btn{height:34px;background:#0D1820;border:1px solid rgba(0,229,204,.14);border-radius:8px;color:#7AADA0;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;padding:0 12px;transition:all .13s;white-space:nowrap;font-family:'DM Sans',system-ui,sans-serif;}
.tb-btn:hover{border-color:rgba(0,229,204,.30);color:#00E5CC;background:#101E2C;}
.tb-btn svg{width:14px;height:14px;stroke:currentColor;flex-shrink:0;}
.tb-btn.active{background:rgba(0,229,204,.10);border-color:rgba(0,229,204,.35);color:#00E5CC;}
.tb-sep{width:1px;height:20px;background:rgba(0,229,204,.09);}

/* Search bar */
.tree-search{position:relative;}
.tree-search input{height:34px;width:200px;background:#0D1820;border:1px solid rgba(0,229,204,.14);border-radius:8px;color:#E8F4F0;font-size:12px;padding:0 32px 0 12px;font-family:'DM Sans',system-ui,sans-serif;outline:none;transition:all .13s;}
.tree-search input:focus{border-color:rgba(0,229,204,.35);width:240px;}
.tree-search input::placeholder{color:#3A5A54;}
.tree-search-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;}
.tree-search-icon svg{width:13px;height:13px;stroke:#3A5A54;}

/* ── Network stats bar ───────────────────────────────── */
.stats-bar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:1px;background:#0D1820;border:1px solid rgba(0,229,204,.12);border-radius:10px;overflow:hidden;pointer-events:none;z-index:10;}
.stat-cell{padding:8px 16px;display:flex;flex-direction:column;align-items:center;gap:1px;border-right:1px solid rgba(0,229,204,.09);}
.stat-cell:last-child{border-right:none;}
.stat-num{font-size:15px;font-weight:600;color:#E8F4F0;font-family:'JetBrains Mono',monospace;line-height:1;}
.stat-label{font-size:9px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:#3A5A54;}

/* ── Zoom controls ───────────────────────────────────── */
.zoom-controls{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:4px;z-index:10;}
.zoom-btn{width:34px;height:34px;background:#0D1820;border:1px solid rgba(0,229,204,.14);border-radius:7px;color:#7AADA0;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .13s;}
.zoom-btn:hover{border-color:rgba(0,229,204,.30);color:#00E5CC;}

/* ── Household panel (right slide-in) ────────────────── */
.hh-panel{position:absolute;top:0;right:0;width:320px;height:100%;background:#0A1520;border-left:1px solid rgba(0,229,204,.10);transform:translateX(100%);transition:transform .22s cubic-bezier(.22,1,.36,1);z-index:200;display:flex;flex-direction:column;overflow:hidden;}
.hh-panel.open{transform:translateX(0);}
.hh-close{position:absolute;top:12px;right:12px;width:28px;height:28px;background:rgba(0,229,204,.08);border:1px solid rgba(0,229,204,.15);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.hh-close:hover{background:rgba(0,229,204,.14);}
.hh-close svg{width:12px;height:12px;stroke:#7AADA0;}
.hh-head{padding:20px 20px 16px;border-bottom:1px solid rgba(0,229,204,.08);flex-shrink:0;}
.hh-avatar{width:56px;height:56px;border-radius:14px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#070D14;}
.hh-name{font-family:'DM Serif Display',serif;font-size:1.2rem;letter-spacing:-.01em;color:#E8F4F0;margin-bottom:3px;}
.hh-location{font-size:12px;color:#5A8A80;display:flex;align-items:center;gap:5px;margin-bottom:8px;}
.hh-location svg{width:11px;height:11px;stroke:currentColor;flex-shrink:0;}
.hh-bio{font-size:12px;color:#7AADA0;line-height:1.65;}
.hh-body{flex:1;overflow-y:auto;padding:16px 20px;}
.hh-body::-webkit-scrollbar{width:3px;}
.hh-body::-webkit-scrollbar-thumb{background:rgba(0,229,204,.15);border-radius:99px;}
.hh-section-title{font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:#3A5A54;margin-bottom:10px;margin-top:16px;}
.hh-section-title:first-child{margin-top:0;}

/* Members list */
.member-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(0,229,204,.05);}
.member-row:last-child{border-bottom:none;}
.member-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#070D14;flex-shrink:0;}
.member-info{flex:1;}
.member-name{font-size:13px;color:#C8D4D0;font-weight:500;}
.member-rel{font-size:11px;color:#3A5A54;}
.member-badge{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:2px 7px;border-radius:999px;background:rgba(0,229,204,.10);color:#007A74;border:1px solid rgba(0,229,204,.18);}

/* Connection chips */
.conn-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
.conn-chip{display:flex;align-items:center;gap:5px;padding:4px 9px;background:#0D1820;border:1px solid rgba(0,229,204,.10);border-radius:999px;font-size:11px;color:#7AADA0;cursor:pointer;transition:all .12s;}
.conn-chip:hover{border-color:rgba(0,229,204,.28);color:#00E5CC;}
.conn-chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* Segment tags */
.seg-tags{display:flex;flex-wrap:wrap;gap:5px;}
.seg-tag{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:10px;font-weight:500;}

/* Life events */
.event-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(0,229,204,.05);}
.event-row:last-child{border-bottom:none;}
.event-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:#0D1820;}
.event-info{flex:1;}
.event-title{font-size:12px;color:#C8D4D0;font-weight:500;}
.event-date{font-size:10px;color:#3A5A54;font-family:'JetBrains Mono',monospace;margin-top:1px;}

/* Privacy badge */
.privacy-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#0D1820;border-radius:8px;margin-bottom:6px;}
.privacy-label{font-size:11px;color:#7AADA0;}
.privacy-val{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:2px 8px;border-radius:999px;}
.pv-full{background:rgba(0,224,64,.10);color:#009828;border:1px solid rgba(0,224,64,.20);}
.pv-partial{background:rgba(224,144,64,.10);color:#A06020;border:1px solid rgba(224,144,64,.20);}
.pv-minimal{background:rgba(0,229,204,.10);color:#007A74;border:1px solid rgba(0,229,204,.18);}

/* Action buttons */
.hh-actions{padding:14px 20px;border-top:1px solid rgba(0,229,204,.08);display:flex;gap:8px;flex-shrink:0;}
.hh-act-btn{flex:1;height:36px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;transition:all .13s;font-family:'DM Sans',system-ui,sans-serif;border:none;}
.hh-act-primary{background:#00E5CC;color:#070D14;}
.hh-act-primary:hover{filter:brightness(1.08);}
.hh-act-secondary{background:#0D1820;border:1px solid rgba(0,229,204,.18);color:#7AADA0;}
.hh-act-secondary:hover{border-color:rgba(0,229,204,.35);color:#00E5CC;}

/* ── D3 graph elements ───────────────────────────────── */
.link{stroke-opacity:.55;transition:stroke-opacity .2s,stroke-width .2s;}
.link:hover{stroke-opacity:.85;}
.link.dim{stroke-opacity:.10;}
.link.highlight{stroke-opacity:1;stroke-width:2.5 !important;}

.node-group{cursor:pointer;}
.node-ring{transition:all .18s;}
.node-label{font-family:'DM Sans',system-ui,sans-serif;font-size:11px;fill:#C8D4D0;text-anchor:middle;pointer-events:none;transition:opacity .18s;}
.node-sublabel{font-family:'DM Sans',system-ui,sans-serif;font-size:9px;fill:#3A5A54;text-anchor:middle;pointer-events:none;}
.node-group.selected .node-ring{filter:drop-shadow(0 0 8px rgba(0,229,204,.7));}
.node-group.dim .node-ring{opacity:.25;}
.node-group.dim .node-label,.node-group.dim .node-sublabel{opacity:.2;}
.node-group.highlighted .node-ring{filter:drop-shadow(0 0 6px rgba(0,229,204,.5));}

/* Ghost node */
.ghost-ring{stroke-dasharray:4,3;}

/* You (root) node glow */
.node-you .node-ring{filter:drop-shadow(0 0 12px rgba(0,224,64,.5));}

/* ── Empty / loading states ──────────────────────────── */
.tree-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;pointer-events:none;}
.tree-empty-icon{font-size:48px;opacity:.18;}
.tree-empty-text{font-size:14px;color:#3A5A54;text-align:center;}

/* ── Tooltip ─────────────────────────────────────────── */
.node-tooltip{position:absolute;background:#0D1820;border:1px solid rgba(0,229,204,.20);border-radius:8px;padding:8px 12px;font-size:11px;color:#C8D4D0;pointer-events:none;opacity:0;transition:opacity .1s;z-index:100;max-width:160px;line-height:1.55;}
.tooltip-name{font-weight:600;color:#E8F4F0;margin-bottom:2px;}
.tooltip-loc{color:#5A8A80;font-size:10px;}

/* ── Invite CTA ──────────────────────────────────────── */
.invite-cta{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(0,224,64,.10);border:1px solid rgba(0,224,64,.25);border-radius:9px;padding:9px 16px;font-size:12px;color:#00A028;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .14s;z-index:10;white-space:nowrap;}
.invite-cta:hover{background:rgba(0,224,64,.16);border-color:rgba(0,224,64,.40);}
.invite-cta svg{width:13px;height:13px;stroke:currentColor;flex-shrink:0;}

/* ── Design review banner ────────────────────────────── */
.dev-banner{background:rgba(224,144,64,.08);border-bottom:1px solid rgba(224,144,64,.15);padding:5px 16px;font-size:10px;color:#A06020;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.dev-banner strong{color:#E09040;}

@media(max-width:720px){
  .seg-sidebar{width:44px;}
  .seg-sidebar .seg-title,.seg-sidebar .seg-label,.seg-sidebar .seg-count,.seg-sidebar .seg-toggle,.seg-sidebar .seg-quick,.seg-sidebar .seg-add-btn,.seg-sidebar .seg-divider{display:none;}
  .seg-sidebar .seg-item{justify-content:center;padding:8px 0;}
  .hh-panel{width:100%;}
  .tree-search input{width:140px;}
  .stats-bar{display:none;}
}
</style>
</head>
<body>

<!-- Dev banner -->
<div class="dev-banner">
  <strong>Design review</strong> · Mock data · No backend · <a href="../index.html" style="color:#A06020;">← Back to hub</a>
</div>

<!-- Nav -->
<nav class="nav">
  <a class="nav-logo" href="../index.html">
    <svg class="nav-logo-mark" viewBox="0 0 44 52" fill="none">
      <!-- Background tree (cyan) -->
      <ellipse cx="30" cy="20" rx="8" ry="11" fill="#00E5CC" opacity=".45"/>
      <ellipse cx="30" cy="12" rx="5" ry="6" fill="#00E5CC" opacity=".35"/>
      <rect x="28.5" y="29" width="3" height="8" rx="1.5" fill="#00E5CC" opacity=".35"/>
      <!-- Foreground tree (green) -->
      <ellipse cx="18" cy="22" rx="11" ry="14" fill="#00E040"/>
      <ellipse cx="18" cy="11" rx="7" ry="8" fill="#00E040"/>
      <ellipse cx="10" cy="18" rx="5" ry="7" fill="#00E040" opacity=".7"/>
      <ellipse cx="26" cy="18" rx="5" ry="7" fill="#00E040" opacity=".7"/>
      <rect x="16.5" y="34" width="3" height="10" rx="1.5" fill="#00A028"/>
    </svg>
    <span class="nav-wordmark">FINDMYTREE</span>
  </a>
  <div class="nav-sep"></div>
  <a class="nav-link active" href="tree.html">Tree</a>
  <a class="nav-link" href="#">Globe</a>
  <a class="nav-link" href="#">Connections</a>
  <a class="nav-link" href="#">Segments</a>
  <div class="nav-r">
    <span class="nav-badge">Bakshi Network</span>
    <div class="nav-avatar" title="Vikas Bakshi">VB</div>
  </div>
</nav>

<!-- Shell -->
<div class="shell">

  <!-- Segment sidebar -->
  <aside class="seg-sidebar" id="segSidebar">
    <div class="seg-header">
      <span class="seg-title">Segments</span>
      <button class="seg-collapse" id="segCollapseBtn" onclick="toggleSidebar()" title="Collapse segments">
        <svg viewBox="0 0 14 14" fill="none" stroke-width="1.8"><path d="M9 2L4 7l5 5"/></svg>
      </button>
    </div>
    <div class="seg-body">
      <div class="seg-quick">
        <button class="seg-qbtn" onclick="allSegments(true)">All</button>
        <button class="seg-qbtn" onclick="allSegments(false)">None</button>
      </div>
      <div id="seg-list"><!-- injected by JS --></div>
      <div class="seg-divider"></div>
      <div class="seg-add-btn" onclick="addSegmentPrompt()">
        <svg viewBox="0 0 14 14" fill="none" stroke-width="1.8"><path d="M7 1v12M1 7h12"/></svg>
        New segment
      </div>
    </div>
  </aside>

  <!-- Canvas -->
  <main class="tree-canvas" id="treeCanvas">

    <!-- Toolbar -->
    <div class="tree-toolbar">
      <div class="toolbar-l">
        <div class="tree-search">
          <input type="text" id="searchInput" placeholder="Search household…" oninput="searchNodes(this.value)">
          <span class="tree-search-icon"><svg viewBox="0 0 14 14" fill="none" stroke-width="1.8"><circle cx="6" cy="6" r="4"/><path d="M9.5 9.5L13 13"/></svg></span>
        </div>
        <div class="tb-sep"></div>
        <button class="tb-btn" id="btnLayout" onclick="toggleLayout()" title="Switch layout">
          <svg viewBox="0 0 14 14" fill="none" stroke-width="1.8"><circle cx="7" cy="4" r="2"/><circle cx="2" cy="11" r="2"/><circle cx="12" cy="11" r="2"/><path d="M7 6v2M7 8L2 9M7 8l5 1"/></svg>
          Radial
        </button>
        <button class="tb-btn active" id="btnForce" onclick="toggleLayout()" title="Force layout">
          <svg viewBox="0 0 14 14" fill="none" stroke-width="1.8"><circle cx="7" cy="7" r="2"/><circle cx="2" cy="2" r="1.5"/><circle cx="12" cy="2" r="1.5"/><circle cx="2" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><path d="M7 5L3.5 3.5M7 5l4-2M7 9l-3.5 1.5M7 9l4 2"/></svg>
          Force
        </button>
      </div>
      <div class="toolbar-r">

function renderSegments() {

function toggleSegment(id) {

function allSegments(on) {

function updateVisibility() {
  if (!svgG) return;
  svgG.selectAll('.link').each(function(d) {
    const visible = d.segs.length === 0 || d.segs.some(s => activeSegments.has(s));
    d3.select(this).classed('dim', !visible).style('display', visible ? null : 'none');
  });

  // Count visible nodes (node is visible if at least one of its segments is active, or it has no segments)
  svgG.selectAll('.node-group').each(function(d) {
    if (d.id === 'you') return;
    const visible = d.segments.length === 0 || d.segments.some(s => activeSegments.has(s));
    d3.select(this).classed('dim', !visible);
  });
}

function updateStats() {

  const visibleLinks = LINKS.filter(l => l.segs.length === 0 || l.segs.some(s => activeSegments.has(s)));
  const countries    = new Set(visibleNodes.map(n => n.country).filter(Boolean));
  document.getElementById('stat-nodes').textContent    = visibleNodes.length;
  document.getElementById('stat-links').textContent    = visibleLinks.length;
  document.getElementById('stat-countries').textContent= countries.size;
  document.getElementById('stat-segs').textContent     = activeSegments.size;
}

// ─────────────────────────────────────────────────────────────
// D3 FORCE GRAPH
// ─────────────────────────────────────────────────────────────
function buildGraph() {
  const canvas = document.getElementById('treeCanvas');
  const W = canvas.offsetWidth;
  const H = canvas.offsetHeight;

  const svg = d3.select('#tree-svg');
  svg.selectAll('*').remove();

  // Zoom
  svgZoom = d3.zoom().scaleExtent([.15, 4]).on('zoom', (event) => {
    currentTransform = event.transform;
    svgG.attr('transform', event.transform);
  });
  svg.call(svgZoom);

  svgG = svg.append('g');

  // Arrow markers (per connection type)
  const defs = svg.append('defs');
  const edgeColors = { family:'#00E5CC', friend:'#00E040', school:'#E09040', custom:'#E05080', pending:'#3A5A54' };
  Object.entries(edgeColors).forEach(([type, color]) => {
    defs.append('marker').attr('id','arr-'+type)
      .attr('viewBox','0 -4 8 8').attr('refX',18).attr('refY',0)
      .attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto')
      .append('path').attr('d','M0,-4L8,0L0,4').attr('fill',color).attr('opacity',.4);
  });

  // Clone data for simulation
  const nodes = NODES.map(n => ({...n}));
  const nodeMap = {};
  nodes.forEach(n => { nodeMap[n.id] = n; });
  const links = LINKS.map(l => ({...l, source: nodeMap[l.source], target: nodeMap[l.target]}));

  // Place root at center
  const rootNode = nodeMap['you'];
  rootNode.fx = W / 2;
  rootNode.fy = H / 2;

  // Simulation
  simulation = d3.forceSimulation(nodes)
    .force('link',    d3.forceLink(links).id(d => d.id).distance(d => d.type === 'pending' ? 80 : 120).strength(.6))
    .force('charge',  d3.forceManyBody().strength(-320))
    .force('collide', d3.forceCollide(38))
    .force('center',  d3.forceCenter(W/2, H/2))
    .alphaDecay(.022);

  // Links
  const linkSel = svgG.append('g').attr('class','links-layer')
    .selectAll('.link')
    .data(links).enter().append('line')
    .attr('class','link')
    .attr('stroke', d => edgeColors[d.type] || '#3A5A54')
    .attr('stroke-width', d => d.type === 'pending' ? 1 : 1.5)
    .attr('stroke-dasharray', d => d.type === 'pending' ? '4,3' : null)
    .attr('marker-end', d => 'url(#arr-'+d.type+')')
    .on('mouseover', function(event, d) { d3.select(this).classed('highlight', true); })
    .on('mouseout',  function(event, d) { d3.select(this).classed('highlight', false); });

  // Node groups
  const nodeSel = svgG.append('g').attr('class','nodes-layer')
    .selectAll('.node-group')
    .data(nodes).enter().append('g')
    .attr('class', d => 'node-group' + (d.isYou ? ' node-you' : '') + (d.ghost ? ' node-ghost' : ''))
    .call(d3.drag()
      .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  (event, d) => { d.fx=event.x; d.fy=event.y; })
      .on('end',   (event, d) => { if (!event.active) simulation.alphaTarget(0); if (!d.isYou){ d.fx=null; d.fy=null; } })
    )
    .on('click',      (event, d) => { event.stopPropagation(); selectNode(d); })
    .on('mouseover',  (event, d) => { showTooltip(event, d); highlightConnected(d); })
    .on('mouseleave', (event, d) => { hideTooltip(); resetHighlight(); });

  // Node circles
  nodeSel.append('circle')
    .attr('class', d => 'node-ring' + (d.ghost ? ' ghost-ring' : ''))
    .attr('r', d => d.isYou ? 24 : (d.ghost ? 14 : 18))
    .attr('fill', d => d.isYou ? d.color : (d.ghost ? 'transparent' : d.color + '22'))
    .attr('stroke', d => d.color)
    .attr('stroke-width', d => d.isYou ? 0 : (d.ghost ? 1.2 : 1.8));

  // Inner circle (for non-root)
  nodeSel.filter(d => !d.isYou && !d.ghost).append('circle')
    .attr('r', 10)
    .attr('fill', d => d.color + '35')
    .attr('stroke', 'none');

  // Emoji / initials
  nodeSel.append('text')
    .attr('text-anchor','middle')
    .attr('dominant-baseline','central')
    .attr('font-size', d => d.isYou ? '14px' : (d.ghost ? '12px' : '13px'))
    .attr('dy', '1px')
    .text(d => d.ghost ? '?' : d.emoji);

  // You label inside node
  nodeSel.filter(d => d.isYou).append('text')
    .attr('class','node-label')
    .attr('y', 34)
    .attr('font-weight','600')
    .attr('fill','#00E040')
    .text('You');

  // Labels below
  nodeSel.filter(d => !d.isYou).append('text')
    .attr('class','node-label')
    .attr('y', d => d.ghost ? 24 : 28)
    .text(d => d.ghost ? 'Pending' : truncate(d.name, 18));

  nodeSel.filter(d => !d.isYou && !d.ghost).append('text')
    .attr('class','node-sublabel')
    .attr('y', 39)
    .text(d => d.city);

  // Tick
  simulation.on('tick', () => {
    linkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeSel.attr('transform', d => 'translate('+d.x+','+d.y+')');
  });

  // Click canvas to deselect
  svg.on('click', () => { deselect(); });

  updateVisibility();
  updateStats();

  // Show invite CTA after load
  setTimeout(() => { document.getElementById('inviteCta').style.display = 'flex'; }, 1200);
}

function truncate(str, n) { return str.length > n ? str.slice(0,n-1)+'…' : str; }

// ─────────────────────────────────────────────────────────────
// NODE SELECTION → PANEL
// ─────────────────────────────────────────────────────────────
function selectNode(d) {
  selectedNode = d;
  svgG.selectAll('.node-group').classed('selected', n => n.id === d.id);
  openPanel(d);
}

function deselect() {
  selectedNode = null;
  svgG.selectAll('.node-group').classed('selected', false);
  closePanel();
}

function highlightConnected(d) {
  if (!svgG) return;
  const connIds = new Set();
  connIds.add(d.id);
  svgG.selectAll('.link').each(function(l) {
    if (l.source.id === d.id || l.target.id === d.id) {
      connIds.add(l.source.id); connIds.add(l.target.id);
    }
  });
  svgG.selectAll('.node-group').classed('dim', n => !connIds.has(n.id));
  svgG.selectAll('.link').classed('dim', l => l.source.id !== d.id && l.target.id !== d.id);
}

function resetHighlight() {
  if (!svgG || selectedNode) return;
  svgG.selectAll('.node-group').classed('dim', false);
  svgG.selectAll('.link').classed('dim', false);
  updateVisibility();
}

      '<div class="member-row">' +
        '<div class="member-av" style="background:'+m.av+'25;border:1px solid '+m.av+'44;color:'+m.av+';">'+m.initials+'</div>' +
        '<div class="member-info"><div class="member-name">'+m.name+'</div><div class="member-rel">'+m.rel+'</div></div>' +
        (m.moderator ? '<span class="member-badge">Moderator</span>' : '') +
      '</div>'
    ).join('');

    // Privacy
    html += '<div class="hh-section-title" style="margin-top:16px;">Your visibility</div>';
    html += '<div class="privacy-row"><span class="privacy-label">Profile access</span><span class="privacy-val ' + (privacyClass[prof.privacy]||'pv-minimal') + '">' + (privacyLabel[prof.privacy]||'Minimal') + '</span></div>';

    // Life events
    if (prof.events && prof.events.length) {
      html += '<div class="hh-section-title" style="margin-top:16px;">Recent events</div>';
      html += prof.events.map(e =>
        '<div class="event-row">' +
          '<div class="event-icon">'+e.icon+'</div>' +
          '<div class="event-info"><div class="event-title">'+e.title+'</div><div class="event-date">'+e.date+'</div></div>' +
        '</div>'
      ).join('');
    }
  } else {
    html += '<div style="margin-top:16px;font-size:12px;color:#5A8A80;line-height:1.65;">Profile details hidden based on their privacy settings.</div>';
  }

  body.innerHTML = html;
  panel.classList.add('open');
}

function closePanel() {
  document.getElementById('hhPanel').classList.remove('open');
  resetHighlight();
}

// ─────────────────────────────────────────────────────────────
// TOOLTIP
// ─────────────────────────────────────────────────────────────
function showTooltip(event, d) {
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-name').textContent = d.ghost ? 'Pending invite' : d.name;
  document.getElementById('tt-loc').textContent  = d.ghost ? 'Awaiting response' : d.city + (d.country ? ', ' + d.country : '') + (d.members > 1 ? ' · ' + d.members + ' members' : '');
  const rect = document.getElementById('treeCanvas').getBoundingClientRect();
  const x = event.clientX - rect.left + 14;
  const y = event.clientY - rect.top  - 10;
  tt.style.left    = x + 'px';
  tt.style.top     = y + 'px';
  tt.style.opacity = '1';
}
function hideTooltip() {
  document.getElementById('tooltip').style.opacity = '0';
}

// ─────────────────────────────────────────────────────────────
// SEARCH
// ─────────────────────────────────────────────────────────────
function searchNodes(val) {
  if (!svgG) return;
  const q = val.toLowerCase().trim();
  if (!q) { svgG.selectAll('.node-group').classed('dim', false); updateVisibility(); return; }
  svgG.selectAll('.node-group').classed('dim', d => {
    return !d.name.toLowerCase().includes(q) && !d.city.toLowerCase().includes(q);
  });
}

// ─────────────────────────────────────────────────────────────
// ZOOM / FIT
// ─────────────────────────────────────────────────────────────
function fitToScreen() {
  const svg    = d3.select('#tree-svg');
  const canvas = document.getElementById('treeCanvas');
  svg.transition().duration(400).call(
    svgZoom.transform,
    d3.zoomIdentity.translate(canvas.offsetWidth/2, canvas.offsetHeight/2).scale(1)
  );
}
function zoomIn()  { d3.select('#tree-svg').transition().duration(200).call(svgZoom.scaleBy, 1.3); }
function zoomOut() { d3.select('#tree-svg').transition().duration(200).call(svgZoom.scaleBy, 0.77); }

// ─────────────────────────────────────────────────────────────
// LABELS
// ─────────────────────────────────────────────────────────────
function toggleLabels() {
  showLabels = !showLabels;
  if (svgG) {
    svgG.selectAll('.node-label,.node-sublabel').style('opacity', showLabels ? null : '0');
  }
  document.getElementById('btnLabels').classList.toggle('active', showLabels);
}
